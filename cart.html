<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>aWebZone | Cart</title>
  <meta name="viewport" content="width=1200" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Inter&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: linear-gradient(#cbb2a2, #f2e2c8);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .cart-container {
      width: 92%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      background: #b07a55;
      border-radius: 10px;
      overflow: hidden;
    }

    /* LEFT CART */
    .cart-left {
      padding: 30px;
      color: #fff;
    }

    .cart-left h2 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .divider {
      height: 2px;
      background: #fff;
      margin: 20px 0;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 120px 1fr 150px;
      gap: 20px;
      align-items: center;
    }

    .item-img {
      width: 120px;
      height: 140px;
      background: #e5e5e5;
      border-radius: 6px;
      overflow: hidden;
    }

    .item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .item-info h3 {
      margin: 0;
    }

    .item-info p {
      margin: 4px 0;
    }

    .item-price {
      font-weight: 700;
    }

    .qty-controls {
      text-align: right;
      font-size: 1.2rem;
    }

    .qty-controls span {
      cursor: pointer;
      margin: 0 6px;
      font-weight: bold;
    }

    .remove {
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 6px;
      display: inline-block;
    }

    .empty-cart {
      padding: 20px 0;
      font-size: 1.05rem;
    }

    /* RIGHT SUMMARY */
    .cart-right {
      background: #222;
      padding: 30px;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .cart-right h3 {
      font-size: 1.8rem;
    }

    .box {
      background: #fff;
      color: #000;
      padding: 14px;
      border-radius: 10px;
      min-height: 70px;
      border: none;
      font: inherit;
      width: 100%;
      outline: none;
    }

    .total {
      background: #fff;
      color: #000;
      padding: 12px;
      border-radius: 999px;
      font-weight: bold;
      text-align: center;
    }

    .pay-btn {
      background: #f4a66e;
      border: none;
      padding: 14px;
      border-radius: 999px;
      font-size: 1.1rem;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      body {
        align-items: flex-start;
      }

      .cart-container {
        width: calc(100% - 20px);
        margin: 10px;
        grid-template-columns: 1fr;
      }

      .cart-left,
      .cart-right {
        padding: 18px;
      }
    }

    @media (max-width: 560px) {
      .cart-left h2,
      .cart-right h3 {
        font-size: 1.5rem;
      }

      .cart-item {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .item-img {
        width: 100%;
        max-width: 140px;
        height: 120px;
      }

      .qty-controls {
        text-align: left;
      }

      .pay-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="cart-container">

    <!-- LEFT -->
    <div class="cart-left">
      <h2>Shopping cart</h2>

      <div class="divider"></div>

      <div id="cartItems"></div>
    </div>

    <!-- RIGHT -->
    <div class="cart-right">
      <h3>Summary</h3>

      <div>
        <p>Shipping Address :</p>
        <textarea class="box" id="shippingAddressInput" placeholder="Enter your shipping address"></textarea>
      </div>

      <input class="box" placeholder="Coupon code" />

      <div class="total" id="totalPrice">TOTAL PRICE: 0</div>

      <button class="pay-btn" id="payBtn" onclick="goToPayment()">Proceed to Payment</button>
    </div>

  </div>

  <script>
    const CART_STORAGE_KEY = "awebzoneCart";
    const SHIPPING_ADDRESS_KEY = "awebzoneShippingAddress";

    function getStoredCart() {
      try {
        const raw = localStorage.getItem(CART_STORAGE_KEY);
        if (!raw) {
          return [];
        }
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function saveCart(cartItems) {
      localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cartItems));
    }

    function saveShippingAddress(address) {
      localStorage.setItem(SHIPPING_ADDRESS_KEY, address);
    }

    function getShippingAddress() {
      return localStorage.getItem(SHIPPING_ADDRESS_KEY) || "";
    }

    function getCartTotal(cartItems) {
      return cartItems.reduce((sum, item) => sum + Number(item.price) * Number(item.qty), 0);
    }

    function calculateTotal(cartItems) {
      const total = getCartTotal(cartItems);
      document.getElementById("totalPrice").textContent = "TOTAL PRICE: " + total;
    }

    function changeQty(itemId, change) {
      const cartItems = getStoredCart();
      const item = cartItems.find((cartItem) => cartItem.id === itemId);
      if (!item) {
        return;
      }

      item.qty = Math.max(1, Number(item.qty) + change);
      saveCart(cartItems);
      renderCart();
    }

    function removeItem(itemId) {
      const cartItems = getStoredCart().filter((item) => item.id !== itemId);
      saveCart(cartItems);
      renderCart();
    }

    function renderCart() {
      const cartItems = getStoredCart();
      const cartItemsContainer = document.getElementById("cartItems");
      const payBtn = document.getElementById("payBtn");

      if (!cartItems.length) {
        cartItemsContainer.innerHTML = '<div class="empty-cart">Your cart is empty.</div>';
        calculateTotal([]);
        payBtn.disabled = true;
        payBtn.style.opacity = "0.6";
        payBtn.style.cursor = "not-allowed";
        return;
      }

      payBtn.disabled = false;
      payBtn.style.opacity = "1";
      payBtn.style.cursor = "pointer";

      cartItemsContainer.innerHTML = cartItems.map((item) => {
        return `
          <div class="cart-item">
            <div class="item-img">
              ${item.image ? `<img src="${item.image}" alt="${item.name}">` : ""}
            </div>

            <div class="item-info">
              <h3>${item.name}</h3>
              <p>${item.description}</p>
              <p class="item-price">Price: ${item.price}₹</p>
            </div>

            <div class="qty-controls">
              <span onclick="changeQty('${item.id}', -1)">-</span>
              <span class="qty">${item.qty}</span>
              <span onclick="changeQty('${item.id}', 1)">+</span>
              <br />
              <span class="remove" onclick="removeItem('${item.id}')">Remove Product</span>
            </div>
          </div>
          <div class="divider"></div>
        `;
      }).join("");

      calculateTotal(cartItems);
    }

    function goToPayment() {
      const cartItems = getStoredCart();
      if (!cartItems.length) {
        return;
      }

      const addressInput = document.getElementById("shippingAddressInput");
      if (addressInput) {
        saveShippingAddress(addressInput.value.trim());
      }

      window.location.href = "payment.html";
    }

    const addressInput = document.getElementById("shippingAddressInput");
    if (addressInput) {
      addressInput.value = getShippingAddress();
      addressInput.addEventListener("input", () => {
        saveShippingAddress(addressInput.value);
      });
    }

    renderCart();
  </script>
  <script src="script.js"></script>

</body>
</html>
