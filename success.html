<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>aWebZone | Success</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Inter&family=Lobster&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #ffb88f;
      font-family: "Inter", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

   .frame {
  width: 92%;
  max-width: 900px;
  height: 500px;
  border: 4px solid #2b2b2b;

  background: url("image copy 12.png") center / cover no-repeat;

  padding: 20px 30px;
  box-sizing: border-box;
  position: relative;
}
    .title {
      text-align: center;
      font-family: "Cinzel", serif;
      font-size: 2rem;
      color: #3a1f12;
      margin-bottom: 20px;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      height: calc(100% - 80px);
    }

    .image-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .circle {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      border: 4px solid #1e90ff;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .right {
      text-align: center;
    }

    .hurray {
      font-family: "Lobster", cursive;
      font-size: 3.5rem;
      color: #3a1f12;
      margin-bottom: 20px;
    }

    .continue {
      font-size: 1.3rem;
      color: #ffffff;
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
    }

    .continue:hover {
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      .content {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .circle {
        width: 220px;
        height: 220px;
      }

      .hurray {
        font-size: 2.6rem;
      }
    }
  </style>
</head>

<body>

  <div class="frame">

    <div class="title">Account Created successfully !</div>

    <div class="content">

      <div class="image-wrap">
        <div class="circle">
          <img src="image copy.png" alt="Success">
        </div>
      </div>

      <div class="right">
        <div class="hurray">Hurray</div>
        <a href="products.html" class="continue">Continue</a>
      </div>

    </div>

  </div>

</body>
</html>
